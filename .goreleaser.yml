version: 2

project_name: rift

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: .
    binary: rift
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/Ommanimesh2/rift/cmd.version={{.Version}}
      - -X github.com/Ommanimesh2/rift/cmd.commitHash={{.ShortCommit}}
      - -X github.com/Ommanimesh2/rift/cmd.buildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

dockers:
  - image_templates:
      - "ghcr.io/Ommanimesh2/rift:{{ .Version }}-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    dockerfile: Dockerfile.goreleaser
    goarch: amd64

  - image_templates:
      - "ghcr.io/Ommanimesh2/rift:{{ .Version }}-arm64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    dockerfile: Dockerfile.goreleaser
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/Ommanimesh2/rift:{{ .Version }}"
    image_templates:
      - "ghcr.io/Ommanimesh2/rift:{{ .Version }}-amd64"
      - "ghcr.io/Ommanimesh2/rift:{{ .Version }}-arm64"

  - name_template: "ghcr.io/Ommanimesh2/rift:latest"
    image_templates:
      - "ghcr.io/Ommanimesh2/rift:{{ .Version }}-amd64"
      - "ghcr.io/Ommanimesh2/rift:{{ .Version }}-arm64"
